version: '3.8'

services:
  mongodb-test:
    image: mongo:latest
    container_name: test_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: test_stock_db
  protoc:
    build:
      context: ./tools/protoc
    volumes:
      - ./src/proto:/proto
      - ./tools/protoc:/tools/protoc
    working_dir: /proto
    command: ["/tools/protoc/gen-protoc.sh"]

networks:
  default:
    name: python-proto-net